apiVersion: apps/v1
kind: Deployment
metadata:
  name: piping-server
  labels:
    app: piping-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: piping-server
  template:
    metadata:
      labels:
        app: piping-server
    spec:
      dnsConfig:
        searches:
          - svc.cluster.local
          - cluster.local
        options:
          - name: single-request-reopen
          - name: use-vc
          - name: ndots
            value: "2"
      containers:
        - name: piping-server
          image: nwtgck/bytenode-piping-server
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          ports:
            - name: http
              hostPort: 8080
              containerPort: 8080
