apiVersion: batch/v1
kind: Job
metadata:
  name: redmine-plugin-migrate
  labels:
    app: redmine
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: redmine
    spec:
      restartPolicy: Never
      initContainers:
        - name: redmine-config-copy
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              cp /config-src/configuration.yml /config-dst/configuration.yml
              cat > /config-dst/database.yml <<EOF
              production:
                adapter: postgresql
                database: ${REDMINE_DB_DATABASE}
                host: ${REDMINE_DB_POSTGRES}
                port: ${REDMINE_DB_PORT:-5432}
                username: ${REDMINE_DB_USERNAME}
                password: ${REDMINE_DB_PASSWORD}
                encoding: utf8
              EOF
              chmod 0644 /config-dst/configuration.yml /config-dst/database.yml
          env:
            - name: REDMINE_DB_POSTGRES
              value: za-pg-16.default.svc.cluster.local
            - name: REDMINE_DB_USERNAME
              value: redmine
            - name: REDMINE_DB_PASSWORD
              value: redmine
            - name: REDMINE_DB_DATABASE
              value: redmine
            - name: REDMINE_DB_PORT
              value: "5432"
          volumeMounts:
            - name: redmine-config-src
              mountPath: /config-src/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: redmine-config-writable
              mountPath: /config-dst
        - name: redmine-plugin-oidc
          image: alpine/git:2.47.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              git clone https://github.com/yude/redmine_oidc.git /plugins/redmine_oidc
          volumeMounts:
            - name: redmine-plugins
              mountPath: /plugins
      containers:
        - name: migrate
          image: redmine:6.1.3-trixie
          imagePullPolicy: Always
          env:
            - name: RAILS_ENV
              value: production
            - name: REDMINE_DB_POSTGRES
              value: za-pg-16.default.svc.cluster.local
            - name: REDMINE_DB_USERNAME
              value: redmine
            - name: REDMINE_DB_PASSWORD
              value: redmine
            - name: REDMINE_DB_DATABASE
              value: redmine
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: redmine-secret
                  key: SECRET_KEY_BASE
          command:
            - /bin/bash
            - -lc
            - |
              set -eu

              echo "Waiting for DB connectivity..." >&2
              host="${REDMINE_DB_POSTGRES:-}"
              port="${REDMINE_DB_PORT:-5432}"
              tries=60
              while [ "$tries" -gt 0 ]; do
                if timeout 2s bash -lc "cat </dev/null >/dev/tcp/${host}/${port}" >/dev/null 2>&1; then
                  echo "DB TCP is reachable." >&2
                  break
                fi
                tries=$((tries - 1))
                sleep 5
              done

              if [ "$tries" -le 0 ]; then
                echo "DB not ready; giving up" >&2
                exit 1
              fi

              echo "Running plugin migration..." >&2
              bundle exec rake redmine:plugins:migrate RAILS_ENV=production
          volumeMounts:
            - name: redmine-config-writable
              mountPath: /usr/src/redmine/config/configuration.yml
              subPath: configuration.yml
            - name: redmine-config-writable
              mountPath: /usr/src/redmine/config/database.yml
              subPath: database.yml
            - name: redmine-plugins
              mountPath: /usr/src/redmine/plugins
      volumes:
        - name: redmine-config-src
          configMap:
            name: redmine-config
        - name: redmine-config-writable
          emptyDir: {}
        - name: redmine-plugins
          emptyDir: {}
