apiVersion: apps/v1
kind: Deployment
metadata:
  name: growi
  namespace: growi
  labels:
    app: growi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: growi
  template:
    metadata:
      labels:
        app: growi
    spec:
      serviceAccountName: growi
      dnsConfig:
        searches:
          - svc.cluster.local
          - cluster.local
        options:
          - name: single-request-reopen
          - name: use-vc
          - name: ndots
            value: "2"
      initContainers:
        - name: fetch-mongo-uri
          image: docker.io/alpine/kubectl:1.36.2
          command:
            - /bin/sh
            - -c
            - |
              USER=$(kubectl get secret mongodb-rs-admin-admin-user -n mongodb \
                -o jsonpath='{.data.username}' | base64 -d)
              PASS=$(kubectl get secret mongodb-rs-admin-admin-user -n mongodb \
                -o jsonpath='{.data.password}' | base64 -d)
              echo "mongodb://${USER}:${PASS}@mongodb-rs-svc.mongodb.svc.cluster.local:27017/growi?authSource=admin&authMechanism=SCRAM-SHA-256&replicaSet=mongodb-rs" > /shared/mongo-uri
          volumeMounts:
            - name: mongo-uri
              mountPath: /shared
      containers:
        - name: growi
          image: docker.io/growilabs/growi:7.5.7
          imagePullPolicy: IfNotPresent
          command:
            - node
            - -e
            - |
              const fs = require('fs');
              const { spawn } = require('child_process');
              const uri = fs.readFileSync('/shared/mongo-uri', 'utf8').trim();
              if (!uri) { console.error('MONGO_URI is empty'); process.exit(1); }
              process.env.MONGO_URI = uri;
              const child = spawn('node', ['/docker-entrypoint.ts'], { stdio: 'inherit', env: process.env });
              ['SIGTERM', 'SIGINT', 'SIGHUP'].forEach(sig => process.on(sig, () => child.kill(sig)));
              child.on('exit', (c, s) => process.exit(c ?? (s === 'SIGTERM' ? 0 : 1)));
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: growi
            - secretRef:
                name: growi
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
            - name: mongo-uri
              mountPath: /shared
              readOnly: true
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: growi-uploads
        - name: mongo-uri
          emptyDir: {}
