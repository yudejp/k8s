apiVersion: apps/v1
kind: Deployment
metadata:
  name: niolesk
  labels:
    app: niolesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: niolesk
  template:
    metadata:
      labels:
        app: niolesk
    spec:
      containers:
        - name: niolesk
          image: ghcr.io/webgiss/niolesk
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          ports:
            - name: http
              containerPort: 80
