apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nrt1-longhorn-frontend
  namespace: longhorn-system
spec:
  defaultBackend:
    service:
      name: longhorn-frontend
      port:
        number: 80
  ingressClassName: tailscale
  tls:
    - hosts:
        - nrt1-longhorn-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nrt1-longhorn-backend
  namespace: longhorn-system
spec:
  defaultBackend:
    service:
      name: longhorn-backend
      port:
        number: 9500
  ingressClassName: tailscale
  tls:
    - hosts:
        - nrt1-longhorn-backend
