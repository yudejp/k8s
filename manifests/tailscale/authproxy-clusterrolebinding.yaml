apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tailscale-auth-proxy
subjects:
  - kind: ServiceAccount
    name: operator
    namespace: tailscale
  - kind: ServiceAccount
    name: kube-apiserver-auth-proxy
    namespace: tailscale
roleRef:
  kind: ClusterRole
  name: tailscale-auth-proxy
  apiGroup: rbac.authorization.k8s.io