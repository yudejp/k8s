apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-loki
  namespace: vm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-loki
  template:
    metadata:
      labels:
        app: vector-loki
    spec:
      containers:
        - name: vector
          image: timberio/vector:0.57.0-alpine
          args:
            - --config
            - /etc/vector/vector.yaml
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GRAFANA_CLOUD_LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-logs
                  key: url
            - name: GRAFANA_CLOUD_LOKI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-logs
                  key: username
            - name: GRAFANA_CLOUD_LOKI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-logs
                  key: apiKey
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: discord-log-alerts
                  key: webhookUrl
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector
      volumes:
        - name: config
          configMap:
            name: vector-loki-config