apiVersion: apps/v1
kind: Deployment
metadata:
  name: growi
  namespace: growi-int
  labels:
    app: growi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: growi
  template:
    metadata:
      labels:
        app: growi
    spec:
      serviceAccountName: growi
      dnsConfig:
        searches:
          - svc.cluster.local
          - cluster.local
        options:
          - name: single-request-reopen
          - name: use-vc
          - name: ndots
            value: "2"
      initContainers:
        - name: fetch-mongo-uri
          image: docker.io/alpine/kubectl:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              USER=$(kubectl get secret mongodb-rs-admin-admin-user -n mongodb \
                -o jsonpath='{.data.username}' | base64 -d)
              PASS=$(kubectl get secret mongodb-rs-admin-admin-user -n mongodb \
                -o jsonpath='{.data.password}' | base64 -d)
              echo "mongodb://${USER}:${PASS}@mongodb-rs-svc.mongodb.svc.cluster.local:27017/growi-int?authSource=admin&authMechanism=SCRAM-SHA-256&replicaSet=mongodb-rs" > /shared/mongo-uri
          volumeMounts:
            - name: mongo-uri
              mountPath: /shared
      containers:
        - name: growi
          image: docker.io/growilabs/growi:7.4.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              export MONGO_URI=$(cat /shared/mongo-uri)
              exec /docker-entrypoint.sh "npm run migrate && node -r dotenv-flow/config --expose_gc dist/server/app.js"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 300
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: growi
            - secretRef:
                name: growi
          volumeMounts:
            - name: mongo-uri
              mountPath: /shared
              readOnly: true
      volumes:
        - name: mongo-uri
          emptyDir: {}
