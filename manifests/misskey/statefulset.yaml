kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: web-deployment
  namespace: misskey-y2e-org
  labels:
    deploy: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      dnsConfig:
        searches:
          - svc.cluster.local
          - cluster.local
        options:
          - name: single-request-reopen
          - name: use-vc
          - name: ndots
            value: "2"
      containers:
        - name: web
          image: misskey/misskey:2026.5.1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /misskey/files
              name: misskey-files
            - mountPath: /misskey/.config
              name: misskey-default-conf-file
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
          resources:
            requests:
              memory: "2Gi"
            limits:
              memory: "4Gi"
      volumes:
        - name: misskey-default-conf-file
          configMap:
            name: misskey-default-config
        - name: misskey-files
          persistentVolumeClaim:
            claimName: misskey-files
