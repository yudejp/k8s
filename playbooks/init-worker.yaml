- name: k3s worker を構築する
  hosts: all
  become: true
  gather_facts: true

  vars:
    debian_extra_components:
      - non-free
      - non-free-firmware
    worker_kernel_modules:
      - overlay
      - br_netfilter
      - iscsi_tcp
      - dm_crypt
    worker_packages:
      - keepalived
      - open-iscsi
      - nfs-common
      - util-linux
      - cryptsetup
      - dmsetup
      - ipset
      - conntrack
      - curl
      - btop
      - wget
      - aria2
      - neowofetch

  handlers:
    - name: systemd を再読み込みする
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: sysctl 設定を反映する
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: keepalived を再起動する
      ansible.builtin.systemd_service:
        name: keepalived.service
        state: restarted

  tasks:
    - name: 対応する OS であることを確認する
      ansible.builtin.assert:
        that:
          - ansible_distribution == 'Debian'
          - ansible_distribution_major_version | int == 13
        fail_msg: This playbook supports Debian 13 only.

    - name: deb822 形式の apt ソースファイルを探す
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns: '*.sources'
        file_type: file
      register: deb822_sources

    - name: 従来形式の apt sources.list が存在するか確認する
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: classic_sources_list

    - name: deb822 ソースで Debian リポジトリの追加コンポーネントを有効化する
      ansible.builtin.replace:
        path: "{{ item.0.path }}"
        regexp: "^(Components:\\s+(?:(?!\\b{{ item.1 }}\\b).)*)$"
        replace: "\\1 {{ item.1 }}"
      loop: "{{ deb822_sources.files | product(debian_extra_components) | list }}"
      when: deb822_sources.matched | int > 0

    - name: 従来形式の sources.list で Debian リポジトリの追加コンポーネントを有効化する
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: "^(deb(?:-src)?\\s+\\S+\\s+\\S+\\s+(?:(?!\\b{{ item }}\\b).)*)$"
        replace: "\\1 {{ item }}"
      loop: "{{ debian_extra_components }}"
      when:
        - deb822_sources.matched | int == 0
        - classic_sources_list.stat.exists

    - name: リポジトリ変更後に apt キャッシュを更新する
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: インストール済みパッケージを最新化する
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: 必要な K3s worker 向けパッケージをインストールする
      ansible.builtin.apt:
        name: "{{ worker_packages }}"
        state: latest
        update_cache: true

    - name: K3s worker 向けカーネルモジュールを永続化する
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s-worker.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          {% for module in worker_kernel_modules %}
          {{ module }}
          {% endfor %}

    - name: K3s worker 向けカーネルモジュールを即時読み込みする
      ansible.builtin.command: modprobe {{ item }}
      loop: "{{ worker_kernel_modules }}"
      changed_when: false

    - name: iscsid サービスを有効化して起動する
      ansible.builtin.systemd_service:
        name: iscsid.service
        enabled: true
        state: started

    - name: アクティブな swap を無効化する
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb | int > 0
      changed_when: ansible_swaptotal_mb | int > 0

    - name: /etc/fstab の swap エントリをコメントアウトする
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!#)(\S+\s+\S+\s+swap\s+\S+.*)$'
        replace: '# \1'

    - name: keepalived 用のインターフェース候補を検出する
      ansible.builtin.shell: |
        ip -o -4 addr show scope global | awk '$4 ~ /^192\.168\.30\.[0-9]+\/24$/ { print $2 ":" $4 }'
      register: keepalived_interface_probe
      changed_when: false

    - name: keepalived 用のインターフェース候補を整理する
      ansible.builtin.set_fact:
        keepalived_interface_candidates: "{{ keepalived_interface_probe.stdout_lines | map('regex_replace', ':.*$', '') | unique | list }}"

    - name: keepalived 用インターフェースが一意に決まることを確認する
      ansible.builtin.assert:
        that:
          - keepalived_interface_candidates | length == 1
        fail_msg: Expected exactly one interface with an address in 192.168.30.0/24.

    - name: keepalived 用の実効設定値を決定する
      ansible.builtin.set_fact:
        keepalived_interface: "{{ keepalived_interface_candidates[0] }}"
        keepalived_interface_ipv4_cidr: "{{ keepalived_interface_probe.stdout_lines[0] | regex_replace('^[^:]+:', '') }}"
        keepalived_interface_ipv4: "{{ (keepalived_interface_probe.stdout_lines[0] | regex_replace('^[^:]+:', '')) | regex_replace('/.*$', '') }}"

    - name: keepalived の優先度を決定する
      ansible.builtin.set_fact:
        keepalived_effective_priority: "{{ keepalived_priority | default(keepalived_interface_ipv4.split('.')[-1] | int) }}"

    - name: keepalived 認証パスワードの長さを確認する
      ansible.builtin.assert:
        that:
          - (keepalived_auth_pass | default('k8svip51')) | length <= 8
        fail_msg: keepalived_auth_pass must be 8 characters or fewer when using auth_type PASS.

    - name: keepalived 設定を配置する
      ansible.builtin.copy:
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          global_defs {
              enable_script_security
          }

          vrrp_instance VI_1 {
              state {{ keepalived_state | default('BACKUP') }}
              interface {{ keepalived_interface }}
              virtual_router_id {{ keepalived_virtual_router_id | default(51) }}
              priority {{ keepalived_effective_priority }}
              advert_int {{ keepalived_advert_int | default(1) }}
              authentication {
                  auth_type PASS
                  auth_pass {{ keepalived_auth_pass | default('k8svip51') }}
              }
              virtual_ipaddress {
                  {{ keepalived_virtual_ip | default('192.168.30.233/24') }} dev {{ keepalived_interface }}
              }
          }
      notify: keepalived を再起動する

    - name: keepalived サービスを有効化して起動する
      ansible.builtin.systemd_service:
        name: keepalived.service
        enabled: true
        state: started

    - name: K3s worker 向け sysctl 設定を永続化する
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-k8s-worker.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          vm.max_map_count = 262144
          vm.overcommit_memory = 1
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          fs.inotify.max_user_watches = 524288
          fs.inotify.max_user_instances = 8192
          net.core.somaxconn = 65535
          net.ipv4.tcp_max_syn_backlog = 8192
          net.core.netdev_max_backlog = 16384
      notify: sysctl 設定を反映する

    - name: THP を無効化する systemd ユニットを配置する
      ansible.builtin.copy:
        dest: /etc/systemd/system/disable-thp.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Disable Transparent Huge Pages (THP)
          DefaultDependencies=no
          After=sysinit.target local-fs.target
          Before=k3s-agent.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'echo madvise > /sys/kernel/mm/transparent_hugepage/enabled || true'
          ExecStart=/bin/sh -c 'echo madvise > /sys/kernel/mm/transparent_hugepage/defrag || true'

          [Install]
          WantedBy=multi-user.target
      notify: systemd を再読み込みする

    - name: THP 無効化サービスを有効化して即時適用する
      ansible.builtin.systemd_service:
        name: disable-thp.service
        enabled: true
        state: started
        daemon_reload: true

    - name: サービス情報を収集する
      ansible.builtin.service_facts:

    - name: multipathd サービスを停止して無効化する
      ansible.builtin.systemd_service:
        name: multipathd.service
        state: stopped
        enabled: false
        masked: true
      when: "'multipathd.service' in ansible_facts.services"

    - name: multipathd socket を停止して無効化する
      ansible.builtin.systemd_service:
        name: multipathd.socket
        state: stopped
        enabled: false
        masked: true
      when: "'multipathd.socket' in ansible_facts.services"

    - name: 同じ実行内で sysctl を反映するために handler を即時実行する
      ansible.builtin.meta: flush_handlers
