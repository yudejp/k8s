apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: lldap-config
    namespace: lldap
    literals:
      - TZ="Asia/Tokyo"
      - GID="1001"
      - UID="1001"
      - LLDAP_LDAP_BASE_DN="dc=y2e,dc=org"

resources:
  - ns.yaml
  - pvc.yaml
  - configmap.yaml
  - svc.yaml
  - admin-credentials.yaml
  - crypto.yaml
  - deployment.yaml
